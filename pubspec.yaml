name: v2ray_stk
description: V2ray Stk - Professional multi-protocol VPN client with Sing-box core, Admin/User panels, full features.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Localization (دوزبانه فارسی + انگلیسی)
  easy_localization: ^3.0.7
  intl: any

  # Storage & Config
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  gap: ^3.0.1

  # QR & Import/Export
  mobile_scanner: ^5.1.1
  qr_flutter: ^4.1.0
  file_picker: ^8.0.3
  share_plus: ^9.0.0
  clipboard: ^0.1.3

  # Network & Stats (واقعی)
  connectivity_plus: ^6.0.3
  network_info_plus: ^5.0.3
  http: ^1.2.1
  dio: ^5.4.3+1
  web_socket_channel: ^3.0.0

  # Permissions & Security
  permission_handler: ^11.3.1
  local_auth: ^2.2.0
  device_info_plus: ^10.1.0

  # VPN related helpers
  flutter_background_service: ^5.0.5
  flutter_local_notifications: ^17.1.2

  # Utils
  uuid: ^4.4.0
  collection: ^1.18.0
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  logger: ^2.3.0
  url_launcher: ^6.2.6
  package_info_plus: ^8.0.0
  wakelock_plus: ^1.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.13.1
  change_app_package_name: ^1.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/translations/
    - assets/translations/en.json
    - assets/translations/fa.json

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#0A1628"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
