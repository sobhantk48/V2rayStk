name: Build V2ray Stk APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Create Android platform (if missing)
        run: |
          if [ ! -d "android" ]; then
            echo "android folder missing → generating..."
            flutter create . --platforms=android --org com.v2raystk --project-name v2ray_stk
          else
            echo "android folder already exists"
          fi

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build APK (release)
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: V2rayStk-APKs
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 14
