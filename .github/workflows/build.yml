name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.22.2"
          cache: false # موقتاً کش رو خاموش می‌کنیم تا از تمیز بودن مطمئن بشیم

      - name: Flutter deps
        run: |
          flutter --version
          flutter clean
          flutter pub get

      - name: Dump Android Gradle files
        run: |
          echo "===== HEAD ====="
          git rev-parse --short HEAD
          echo "===== settings.gradle ====="
          cat android/settings.gradle

      - name: Build APK
        run: |
          set -o pipefail
          flutter build apk --release --split-per-abi -v 2>&1 | tee flutter-build.log
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4G -Dfile.encoding=UTF-8"

      - name: Upload APKs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: build/app/outputs/flutter-apk/*.apk

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build-log
          path: flutter-build.log
