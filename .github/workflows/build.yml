name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.22.2"
          cache: true

      - name: Flutter deps
        run: |
          flutter --version
          flutter pub get

      - name: Dump Android Gradle files
        run: |
          echo "===== HEAD ====="
          git rev-parse --short HEAD
          echo "===== files ====="
          find android -maxdepth 4 -type f | sort
          echo "===== wrapper ====="
          cat android/gradle/wrapper/gradle-wrapper.properties
          echo "===== settings.gradle ====="
          cat android/settings.gradle
          echo "===== root build.gradle ====="
          cat android/build.gradle
          echo "===== app/build.gradle ====="
          cat android/app/build.gradle
          echo "===== gradle.properties ====="
          cat android/gradle.properties
          echo "===== local.properties ====="
          cat android/local.properties || true
          echo "===== libbox ====="
          ls -lh android/app/libs/libbox.aar || echo "MISSING libbox.aar"
          echo "===== version ====="
          grep -n "^version:" pubspec.yaml || true

      - name: Build APK
        run: |
          set -o pipefail
          flutter build apk --release --split-per-abi -v 2>&1 | tee flutter-build.log
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4G -Dfile.encoding=UTF-8"

      - name: Upload APKs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: warn

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build-log
          path: flutter-build.log
          if-no-files-found: warn
