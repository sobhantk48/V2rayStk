name: Build release APK

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: Create a GitHub release for this ref
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Verify native dependencies
        run: test -s android/app/libs/libbox.aar
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze Dart sources
        run: flutter analyze
      - name: Build release APKs
        run: flutter build apk --release --split-per-abi
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4G -Dfile.encoding=UTF-8
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: v2ray-stk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 14
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.create_release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*.apk
          generate_release_notes: true
