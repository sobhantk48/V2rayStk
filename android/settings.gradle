pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropertiesFile = file("local.properties")
        if (!localPropertiesFile.exists()) {
            // flutter tool normally creates this; keep a clear error if missing
            throw new GradleException("local.properties not found. Run from Flutter (flutter build) so flutter.sdk is written.")
        }
        localPropertiesFile.withInputStream { properties.load(it) }
        def path = properties.getProperty("flutter.sdk")
        if (path == null || path.trim().isEmpty()) {
            throw new GradleException("flutter.sdk not set in local.properties")
        }
        return path
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "1.8.22" apply false
}

include ":app"
