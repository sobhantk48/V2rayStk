plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

android {
    namespace = "com.v2raystk.v2ray_stk"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        // keep desugar OFF unless you explicitly need Java 8+ APIs on old minSdk
        coreLibraryDesugaringEnabled = false
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.v2raystk.v2ray_stk"
        minSdk = 24
        targetSdk = flutter.targetSdkVersion
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
        multiDexEnabled = true

        // Prefer real ABIs that libbox usually ships
        ndk {
            abiFilters "arm64-v8a", "armeabi-v7a", "x86_64"
        }
    }

    // IMPORTANT: do not combine conflicting splits with abiFilters in CI.
    // --split-per-abi is handled by Flutter; keep Gradle splits disabled.
    splits {
        abi {
            enable false
        }
    }

    buildTypes {
        release {
            // CI unsigned/debug-signing is fine for now; replace later with real keystore
            signingConfig = signingConfigs.debug
            minifyEnabled = false
            shrinkResources = false
        }
        debug {
            minifyEnabled = false
        }
    }

    packaging {
        jniLibs {
            useLegacyPackaging = true
            pickFirsts += [
                "lib/arm64-v8a/libbox.so",
                "lib/armeabi-v7a/libbox.so",
                "lib/x86_64/libbox.so",
                "lib/x86/libbox.so"
            ]
        }
        resources {
            excludes += [
                "META-INF/DEPENDENCIES",
                "META-INF/LICENSE",
                "META-INF/LICENSE.txt",
                "META-INF/license.txt",
                "META-INF/NOTICE",
                "META-INF/NOTICE.txt",
                "META-INF/notice.txt",
                "META-INF/*.kotlin_module"
            ]
        }
    }
}

flutter {
    source = "../.."
}

repositories {
    flatDir {
        dirs "libs"
    }
}

dependencies {
    // Explicit local AAR (must exist at android/app/libs/libbox.aar)
    implementation files("libs/libbox.aar")

    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "com.google.android.material:material:1.11.0"
    implementation "androidx.multidex:multidex:2.0.1"
}
