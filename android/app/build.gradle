plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android'; id 'dev.flutter.flutter-gradle-plugin' }

android {
    namespace 'com.v2raystk.app'
    compileSdk 35
    ndkVersion '27.0.12077973'
    defaultConfig {
        applicationId 'com.v2raystk.app'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '1.0.0'
        externalNativeBuild { cmake { cppFlags '-std=c++17' } }
    }
    externalNativeBuild { cmake { path 'src/main/cpp/CMakeLists.txt'; version '3.22.1' } }
    buildTypes { release { minifyEnabled false; signingConfig signingConfigs.debug } }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.appcompat:appcompat:1.7.0'
}

flutter { source '../..' }
