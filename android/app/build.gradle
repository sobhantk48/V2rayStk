plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null || flutterVersionCode.trim().isEmpty()) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null || flutterVersionName.trim().isEmpty()) {
    flutterVersionName = "1.0.0"
}

android {
    namespace = "com.v2raystk.v2ray_stk"

    // Explicit ints — avoid null cast from flutter.* extension
    compileSdk = 34

    ndkVersion = "26.1.10909125"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled = false
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.v2raystk.v2ray_stk"
        minSdk = 24
        targetSdk = 34
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
        multiDexEnabled = true

        ndk {
            abiFilters "arm64-v8a", "armeabi-v7a", "x86_64"
        }
    }

    splits {
        abi {
            enable false
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
            minifyEnabled = false
            shrinkResources = false
        }
        debug {
            minifyEnabled = false
        }
    }

    packaging {
        jniLibs {
            useLegacyPackaging = true
            pickFirsts += [
                "lib/arm64-v8a/libbox.so",
                "lib/armeabi-v7a/libbox.so",
                "lib/x86_64/libbox.so",
                "lib/x86/libbox.so"
            ]
        }
        resources {
            excludes += [
                "META-INF/DEPENDENCIES",
                "META-INF/LICENSE",
                "META-INF/LICENSE.txt",
                "META-INF/license.txt",
                "META-INF/NOTICE",
                "META-INF/NOTICE.txt",
                "META-INF/notice.txt",
                "META-INF/*.kotlin_module"
            ]
        }
    }
}

flutter {
    source = "../.."
}

repositories {
    flatDir {
        dirs "libs"
    }
}

dependencies {
    implementation files("libs/libbox.aar")
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "com.google.android.material:material:1.11.0"
    implementation "androidx.multidex:multidex:2.0.1"
}
