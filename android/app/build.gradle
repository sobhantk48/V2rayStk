plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

android {
    namespace = "com.v2raystk.v2ray_stk"
    compileSdk = 34

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        applicationId = "com.v2raystk.v2ray_stk"
        minSdk = 24
        targetSdk = 34
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
        multiDexEnabled = true

        // IMPORTANT:
        // Do NOT set ndk.abiFilters here when building with:
        //   flutter build apk --split-per-abi
        // Flutter/AGP already configures splits.abi — both together = conflict.
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
            minifyEnabled = false
            shrinkResources = false
        }
    }

    packagingOptions {
        pickFirst "lib/**/libbox.so"
        pickFirst "lib/**/libc++_shared.so"
        doNotStrip "**/libbox.so"
    }
}

flutter {
    source = "../.."
}

repositories {
    flatDir {
        dirs "libs"
    }
}

dependencies {
    implementation files("libs/libbox.aar")
    implementation "androidx.multidex:multidex:2.0.1"
}
