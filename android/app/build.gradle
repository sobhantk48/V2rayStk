plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    // پکیج‌آیدی پروژه‌ت رو اگر متفاوته اینجا تغییر بده
    namespace "com.example.v2ray_stk" 
    compileSdk 34

    defaultConfig {
        // پکیج‌آیدی اجرایی رو هم اینجا ست کن
        applicationId "com.example.v2ray_stk"
        minSdk 21
        targetSdk 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

flutter {
    source "../.."
}
